use_default_settings: true

general:
  instance_name: "Kobel Leder-Suche"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "de"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "kobel-searxng-secret-2026"
  limiter: false

engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    language: de
  - name: bing
    engine: bing
    shortcut: bi

outgoing:
  request_timeout: 6.0

ui:
  static_use_hash: true
